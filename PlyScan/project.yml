name: PlyScan
options:
  bundleIdPrefix: com.cs179m
  deploymentTarget:
    iOS: 15.0
  developmentLanguage: en
  
targets:
  PlyScan:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: App
      - path: AR
      - path: Export
      - path: Models
      - path: Networking
      - path: Utilities
    resources:
      - Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: PlyScan
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientationsIPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "PlyScan needs camera access to capture 3D scans"
        NSPhotoLibraryUsageDescription: "PlyScan needs photo library access to save scans"
    settings:
      base:
        PRODUCT_NAME: PlyScan
        PRODUCT_BUNDLE_IDENTIFIER: com.cs179m.PlyScan
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        ENABLE_PREVIEWS: true
        DEVELOPMENT_ASSET_PATHS: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
