services:
  - type: web
    name: ply-scanner-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.ply_upload:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: ply-storage
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
